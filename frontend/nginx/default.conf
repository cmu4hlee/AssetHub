server {
  listen 80;
  server_name _;
  client_max_body_size 100m;
  root /usr/share/nginx/html;
  index index.html;

  # Docker internal DNS resolver
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types 
    text/plain 
    text/css 
    text/xml 
    text/javascript 
    application/javascript 
    application/json 
    application/xml 
    application/xml+rss
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml;
  gzip_disable "msie6";

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Main entry - cache HTML but not for development
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # API proxy with optimizations
  location /api/ {
    proxy_pass http://assetrob-backend:5183/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
  }

  # Uploads proxy
  location /uploads/ {
    proxy_pass http://assetrob-backend:5183/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 8k;
  }

  # WebSocket/Socket.IO support
  location /socket.io/ {
    proxy_pass http://assetrob-backend:5183/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # Static assets - long cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }
  
  # Precompressed files (.gz)
  location ~* \.(js|css|html|svg)$ {
    gzip_static on;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Content-Encoding gzip;
    access_log off;
  }
}
