# =============================================
# AssetHub Docker Compose 配置
# 生产环境完整部署
# =============================================

services:
  # =============================================
  # MySQL 数据库
  # =============================================
  mysql:
    image: mysql:8.0
    container_name: assethub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-AssetHub2024!}
      MYSQL_DATABASE: ${DB_NAME:-zcgl}
      MYSQL_USER: ${DB_USER:-assethub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-AssetHub2024!}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --innodb_buffer_pool_size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-AssetHub2024!}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assethub

  # =============================================
  # Redis 缓存
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: assethub-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assethub

  # =============================================
  # 后端 API 服务
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: assetrob/backend:latest
    container_name: assethub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5183
      SERVER_HOST: 0.0.0.0
      FRONTEND_URL: http://frontend:80
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-assethub}
      DB_PASSWORD: ${DB_PASSWORD:-AssetHub2024!}
      DB_NAME: ${DB_NAME:-zcgl}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - backend_backups:/app/backups
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-5183}:5183"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:5183/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - assethub

  # =============================================
  # 前端 Web 服务
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: assetrob/frontend:latest
    container_name: assethub-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-13579}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - assethub

  # =============================================
  # Nginx 反向代理（可选）
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: assethub-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - assethub

# =============================================
# 数据卷
# =============================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_backups:
    driver: local
  backend_logs:
    driver: local

# =============================================
# 网络
# =============================================
networks:
  assethub:
    driver: bridge
