# AssetHub 飞牛服务器 Docker Compose 配置
version: '3.8'

services:
  # 后端服务
  backend:
    image: assethub/backend:feiniu
    container_name: assethub-backend
    build:
      context: ../backend
      dockerfile: ../deploy-feiniu/Dockerfile.backend
    ports:
      - "5183:5183"
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/backups:/app/backups
      - ./data/logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=5183
      - SERVER_HOST=0.0.0.0
      - DB_HOST=192.168.1.111
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=CHANGE_ME_DB_PASSWORD
      - DB_NAME=zcgl
      - JWT_SECRET=CHANGE_ME_JWT_SECRET
      - JWT_EXPIRES_IN=86400
      - FRONTEND_URL=http://192.168.1.132
      - CORS_ORIGIN=http://192.168.1.132,http://localhost,http://localhost:80
      - FRONTEND_DOMAIN=192.168.1.132
      - REDIS_ENABLED=false
      - OPENCLAW_ENABLED=true
      - GATEWAY_BASE_URL=http://192.168.1.111:18789
      - ASSET_ASSISTANT_BASE_URL=http://192.168.1.80:8000/
    restart: unless-stopped
    networks:
      - assethub-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const options = { hostname: 'localhost', port: 5183, path: '/api/health', timeout: 5000 }; const req = http.request(options, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    image: assethub/frontend:feiniu
    container_name: assethub-frontend
    build:
      context: ../frontend
      dockerfile: ../deploy-feiniu/Dockerfile.frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - assethub-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  assethub-network:
    driver: bridge

volumes:
  assethub-uploads:
  assethub-backups:
  assethub-logs:
